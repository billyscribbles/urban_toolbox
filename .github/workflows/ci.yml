name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Check formatting
        run: yarn format:check

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      # Enforces the CLAUDE.md launch thresholds: performance >= 90,
      # accessibility >= 90, SEO >= 95. Serves the build via `yarn start`.
      - name: Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          temporaryPublicStorage: true
