<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/brand/favicon.png" />
    <link rel="apple-touch-icon" href="/brand/apple-touch-icon.png" />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- Preload the LCP hero image so it paints fast. Must mirror the widths and
         sizes the left HeroPanel renders (see SplitHero.jsx / HeroPanel.jsx), or
         the browser preloads a file the page never uses. Non-WebP browsers
         ignore this and fetch the JPEG fallback. Listed before the fonts on
         purpose: same-priority preloads are fetched in document order, and the
         hero is what LCP is waiting on. -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/brand/hero-caravan-1600.webp"
      imagesrcset="/brand/hero-caravan-800.webp 800w, /brand/hero-caravan-1600.webp 1600w"
      imagesizes="(max-width: 760px) 100vw, 50vw"
      fetchpriority="high"
    />

    <!-- Fonts are self-hosted (see src/fonts.css). Preload the three faces that
         paint above the fold — Manrope 800 for the display headings, 700 for the
         hero eyebrow / nav, 400 for body copy. They are declared
         `font-display: optional`, so winning this race is what decides whether
         the page renders in Manrope at all; the remaining weights load on demand
         from the @font-face rules. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/manrope-800.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/manrope-700.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/manrope-400.woff2" crossorigin />

    <!-- Fallback SEO — runtime Helmet (src/lib/seo.jsx) overrides these per page.
         og-image.png is a 1200x630 raster; social platforms do not render SVG. -->
    <title>Urban Toolboxes — Custom Aluminium Caravan & Ute Toolboxes | Dandenong South</title>
    <meta
      name="description"
      content="Australian-made custom aluminium caravan toolboxes, ute accessories, and fabrication — designed and built in Dandenong South, Victoria. Built to work. Built to last."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Urban Toolboxes" />
    <meta
      property="og:title"
      content="Urban Toolboxes — Custom Aluminium Caravan & Ute Toolboxes"
    />
    <meta
      property="og:description"
      content="Australian-made custom aluminium toolboxes and fabrication, built in Dandenong South, Victoria."
    />
    <meta property="og:image" content="/brand/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Urban Toolboxes — Custom Aluminium Caravan & Ute Toolboxes"
    />
    <meta
      name="twitter:description"
      content="Australian-made custom aluminium toolboxes and fabrication, built in Dandenong South, Victoria."
    />
    <meta name="twitter:image" content="/brand/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
