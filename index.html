<!doctype html>
<html lang="en">
  <head>

    <link rel="icon" type="image/png" href="/brand/favicon.png" />
    <link rel="apple-touch-icon" href="/brand/apple-touch-icon.png" />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- Google Fonts: Anton (display), Barlow (body/UI), JetBrains Mono (labels).
         Preconnect first so the font CSS + files resolve without a slow handshake. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Fallback SEO — runtime Helmet (src/lib/seo.jsx) overrides these per page.
         og-image.png is a 1200x630 raster; social platforms do not render SVG. -->
    <title>Urban Toolboxes — Custom Aluminium Caravan & Ute Toolboxes | Dandenong South</title>
    <meta
      name="description"
      content="Australian-made custom aluminium caravan toolboxes, ute accessories, and metal fabrication — designed and built in Dandenong South, Victoria. Built to work. Built to last."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Urban Toolboxes" />
    <meta
      property="og:title"
      content="Urban Toolboxes — Custom Aluminium Caravan & Ute Toolboxes"
    />
    <meta
      property="og:description"
      content="Australian-made custom aluminium toolboxes and fabrication, built in Dandenong South, Victoria."
    />
    <meta property="og:image" content="/brand/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Urban Toolboxes — Custom Aluminium Caravan & Ute Toolboxes"
    />
    <meta
      name="twitter:description"
      content="Australian-made custom aluminium toolboxes and fabrication, built in Dandenong South, Victoria."
    />
    <meta name="twitter:image" content="/brand/og-image.png" />
  </head>

  </body>
</html>
