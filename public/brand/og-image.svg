      <stop offset="1" stop-color="#57a53c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#tread)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

